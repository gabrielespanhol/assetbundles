resources:
  jobs:
    job_ingestion:
      name: job_ingestion
      tasks:
        - task_key: insgeston
          notebook_task:
            notebook_path: ../../src/notebooks/ingestion.ipynb
            base_parameters:
              catalog_name: ${var.catalog_name}
            source: WORKSPACE
      queue:
        enabled: true
      performance_target: PERFORMANCE_OPTIMIZED
